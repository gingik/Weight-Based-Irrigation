[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_build.partitions = partitions_custom.csv
board_build.filesystem = littlefs
lib_deps =
  bogde/HX711@^0.7.5
  bblanchon/ArduinoJson@^7.0.4
  adafruit/RTClib@^2.1.4
build_flags =
  -DCORE_DEBUG_LEVEL=1
